const now=new Date();

document.getElementById('footerDate').textContent=now.toLocaleString();

function fN(n){return Number(n).toLocaleString();}
function rateClass(r){return r>=6?'hi':r>=4?'mid':'lo';}
function ctrClass(c){return c>=0.4?'hi':c>=0.2?'mid':'lo';}
function ctorClass(c){return c>=7?'hi':c>=4?'mid':'lo';}
function calcCtor(clicks,opens){return opens>0?+(clicks/opens*100).toFixed(2):0;}

function typeChip(t){
  const m={
    Webinar:'chip-webinar',Podcast:'chip-podcast',GatedContent:'chip-gated',
    HLR:'chip-hlr',ICYMI:'chip-icymi',QTVideo:'chip-qt',WOD:'chip-wod',
    Whitepaper:'chip-gated',Intel:'chip-hlr',Supplement:'chip-hlr',
    Roundtable:'chip-icymi',Custom:'chip-wod',Guide:'chip-wod',Event:'chip-icymi'
  };
  return `<span class="chip ${m[t]||'chip-webinar'}">${t}</span>`;
}

function buildBarChart(canvasId, labels, datasets, tooltipSuffix){
  const blue='rgba(0,75,135,.8)',teal='rgba(0,150,180,.8)',amber='rgba(245,158,11,.8)',green='rgba(34,197,94,.8)';
  const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{color:'#64748b',font:{size:11}}},x:{grid:{display:false},ticks:{color:'#64748b',font:{size:11}}}}};
  const el=document.getElementById(canvasId);
  if(!el) return;
  if(datasets.length===1){
    new Chart(el,{type:'bar',data:{labels,datasets:[{data:datasets[0].data,backgroundColor:[blue,teal,amber],borderRadius:6,borderSkipped:false}]},options:{...opts,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>' '+v.raw.toLocaleString()+' '+tooltipSuffix}}}}});
  } else {
    new Chart(el,{type:'bar',data:{labels,datasets:datasets.map((d,i)=>({label:d.label,data:d.data,backgroundColor:i===0?blue:green,borderRadius:6,borderSkipped:false}))},options:{...opts,plugins:{legend:{display:true,labels:{color:'#475569',font:{size:11}}},tooltip:{callbacks:{label:v=>' '+v.dataset.label+': '+v.raw+'%'}}}}});
  }
}

function buildCampaignTable(tbodyId, data, cols){
  const tbody=document.getElementById(tbodyId);
  if(!tbody) return;
  tbody.innerHTML=data.map(c=>{
    const dateStr=new Date(c.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const name=c.name?(c.name.replace('CustomMedia-','').replace(/-202\d+$/,'')):c.client;
    const subj=c.subject||'';
    const sent=c.sent||0;
    const opens=c.real_opens||0;
    const or_pct=c.open_rate||c.or_pct||0;
    const clicks=c.unique_real_clicks||0;
    const ctr=c.ctr||0;
    return `<tr>
      <td class="cn">${name}</td>
      <td class="subj">${subj}</td>
      <td style="white-space:nowrap">${dateStr}</td>
      <td>${typeChip(c.type)}</td>
      <td class="num">${fN(sent)}</td>
      <td class="num">${fN(opens)}</td>
      <td class="num"><span class="rate ${rateClass(or_pct)}">${or_pct}%</span></td>
      <td class="num">${fN(clicks)}</td>
      <td class="num"><span class="rate ${ctrClass(ctr)}">${ctr}%</span></td>
    </tr>`;
  }).join('');
}

function sortGenericTable(tbodyId, col){
  const tbody=document.getElementById(tbodyId);
  if(!tbody) return;
  const rows=[...tbody.querySelectorAll('tr')];
  const dir=tbody.dataset.sortDir==='asc'?'desc':'asc';
  tbody.dataset.sortDir=dir;
  rows.sort((a,b)=>{
    const av=a.cells[col]?.textContent?.replace(/[%,$\s]/g,'').trim()||'';
    const bv=b.cells[col]?.textContent?.replace(/[%,$\s]/g,'').trim()||'';
    const an=parseFloat(av.replace(/,/g,'')),bn=parseFloat(bv.replace(/,/g,''));
    if(!isNaN(an)&&!isNaN(bn)) return dir==='asc'?an-bn:bn-an;
    return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
  });
  rows.forEach(r=>tbody.appendChild(r));
}

function buildBestPerformers(orId, ctrId, data){
  const medals=['🥇','🥈','🥉','4','5'];
  const sorted_or=[...data].sort((a,b)=>(b.open_rate||b.or_pct||0)-(a.open_rate||a.or_pct||0)).slice(0,5);
  const sorted_ctr=[...data].sort((a,b)=>(b.ctr||0)-(a.ctr||0)).slice(0,5);
  const orEl=document.getElementById(orId);
  if(orEl) orEl.innerHTML=sorted_or.map((c,i)=>`<tr${i<3?' class="best-row"':''}>
    <td>${medals[i]}</td>
    <td class="cn">${c.name?(c.name.replace('CustomMedia-','').replace(/-202\d+$/,'')):c.client}</td>
    <td class="subj">${c.subject||''}</td>
    <td style="white-space:nowrap">${new Date(c.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</td>
    <td class="num">${fN(c.sent)}</td>
    <td class="num">${fN(c.real_opens)}</td>
    <td class="num"><span class="rate hi">${c.open_rate||c.or_pct}%</span></td>
    <td class="num">${c.ctr}%</td>
  </tr>`).join('');
  const ctrEl=document.getElementById(ctrId);
  if(ctrEl) ctrEl.innerHTML=sorted_ctr.map((c,i)=>`<tr${i<3?' class="best-row"':''}>
    <td>${medals[i]}</td>
    <td class="cn">${c.name?(c.name.replace('CustomMedia-','').replace(/-202\d+$/,'')):c.client}</td>
    <td class="subj">${c.subject||''}</td>
    <td style="white-space:nowrap">${new Date(c.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</td>
    <td class="num">${fN(c.sent)}</td>
    <td class="num">${fN(c.unique_real_clicks)}</td>
    <td class="num"><span class="rate hi">${c.ctr}%</span></td>
    <td class="num">${c.open_rate||c.or_pct}%</td>
  </tr>`).join('');
}

/* ── Monthly summary table builder ── */
function buildMonthlyTable(tbodyId, rows){
  const tbody=document.getElementById(tbodyId);
  if(!tbody) return;
  const hasConvs=rows.length>0 && rows[0].leads!==undefined;
  tbody.innerHTML=rows.map((r,i)=>`<tr${i===rows.length-1?' class="hl"':''}>
    <td style="font-weight:800">${r.month}${i===rows.length-1?' <small style="font-weight:400;color:#94a3b8">(partial)</small>':''}</td>
    <td class="num">${r.n}</td>
    <td class="num">${fN(r.sent)}</td>
    <td class="num">${fN(r.opens)}</td>
    <td class="num"><span class="rate ${rateClass(r.or)}">${r.or}%</span></td>
    <td class="num">${fN(r.clicks)}</td>
    <td class="num"><span class="rate ${ctrClass(r.ctr/100)}">${r.ctr}%</span></td>
    <td class="num">${i===0?'<span class="flat">—</span>':'<span class="'+(r.mom_or>=0?'up':'dn')+'">'+(r.mom_or>=0?'+':'')+r.mom_or+'pts</span>'}</td>
    <td class="num">${i===0?'<span class="flat">—</span>':'<span class="'+(r.mom_ctr>=0?'up':'dn')+'">'+(r.mom_ctr>=0?'+':'')+r.mom_ctr+'pts</span>'}</td>
    ${hasConvs?`<td class="num" style="color:#10b981;font-weight:700">${r.leads??'—'}</td><td class="num" style="color:#3b82f6;font-weight:700">${r.regs??'—'}</td>`:''}
  </tr>`).join('');
}

function buildAllTable(data){
  const tbody=document.getElementById('mh-tbody');
  if(!tbody) return;
  tbody.innerHTML=data.map(c=>{
    const name=c.name.replace('CustomMedia-','').replace(/-202\d+$/,'');
    const dateStr=new Date(c.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const ctor_val=calcCtor(c.unique_real_clicks,c.real_opens);
    return `<tr>
      <td class="cn">${name}</td>
      <td class="subj">${c.subject}</td>
      <td style="white-space:nowrap">${dateStr}</td>
      <td>${typeChip(c.type)}</td>
      <td class="num">${fN(c.sent)}</td>
      <td class="num">${fN(c.real_opens)}</td>
      <td class="num"><span class="rate ${rateClass(c.open_rate)}">${c.open_rate}%</span></td>
      <td class="num">${fN(c.unique_real_clicks)}</td>
      <td class="num"><span class="rate ${ctrClass(c.ctr)}">${c.ctr}%</span></td>
      <td class="num"><span class="rate ${ctorClass(ctor_val)}">${ctor_val}%</span></td>
      <td class="num">${convChip(c.name)}</td>
    </tr>`;
  }).join('');
}

function filterMHTable(){
  const v=document.getElementById('mh-type-filter').value;
  buildAllTable(v?campaigns.filter(c=>c.type===v):campaigns);
}

    <div class="insight good">
      <div class="insight-icon">🔬</div>
      <hh4>CTOR Is the Better Cross-Brand Metric — Detroit 10.5%, GenomeWeb 7.1%</h4>
      <p>Click-to-Open Rate (CTOR = clicks ÷ opens) removes list-size bias, making it the best apples-to-apples comparator across brands. Detroit leads at 10.49% CTOR, GenomeWeb at 7.08%, MH at 5.37%. AdAge (3.70%) and P&amp;I (3.58%) show lower content engagement ratios despite strong send volumes.</p>
    </div>
    <div class="insight good">
      <div class="insight-icon">🌆</div>
      <h4>Crain's Chicago BPTW Opt-In List Is the Portfolio's Top Engager</h4>
      <p>Best Places to Work emails to 17K self-selected subscribers hit 21–35% open rates — the highest in the entire portfolio. The Apr 28 email ("What We See in Strong Workplaces") achieved 34.78% OR and 0.80% CTR. Opt-in audience segmentation is the single most powerful engagement lever across all brands.</p>
    </div>
    <div class="insight warn">
      <div class="insight-icon">📉</div>
      <h4>May CTR Declining Across 4 of 5 Brands — Watch for Recovery in June</h4>
      <p>CTR dropped from March to May for MH (0.24%→0.20%), Ad Age (0.19%→0.12%), P&I (0.34%→0.21%), and GenomeWeb (0.48%→0.43%). This is consistent with webinar series maturing into replay/WOD sends and audiences seeing repeat content. GenomeWeb held best. New June webinar launches across all brands should reset this trend.</p>
    </div>
    <div class="insight info">
      <div class="insight-icon">💼</div>
      <h4>Pensions &amp; Investments Is the Most Volume-Consistent Brand</h4>
      <p>P&I sends 750K–930K emails per month and never drops below 5% OR, generating the most clicks of any brand (8,097). Supplement and replay formats are standout — the OCIO Strategy Replay (Apr 28) hit 0.73% CTR on a 50K list. Infrastructure and alternatives topics drive the strongest engagement across all P&I content types.</p>
    </div>
    <div class="insight">
      <div class="insight-icon">📊</div>
      <h4>Ad Age Drives 50% of Portfolio Volume but at Lowest Open Rate</h4>
      <p>Ad Age accounts for 4.19M of 11.2M total sends (37%) at a 3.9% blended OR — the lowest of all brands. This reflects the broadest, least segmented audience. Webinar promo emails (0.22% CTR) outperform whitepaper sends (0.14% CTR) by 1.6×. AI and influencer-themed content drives outsized whitepaper engagement.</p>
    </div>
    <div class="insight">

function getAllCampaigns(){
  const all=[];
  campaigns.forEach(c=>all.push({brand:'🏥 MH',client:c.name.replace('CustomMedia-','').replace(/-202\d[\d-]*$/,'').replace(/-/g,' '),date:c.date,subject:c.subject,sent:c.sent,or_pct:c.open_rate,ctr:c.ctr,unique_real_clicks:c.unique_real_clicks}));
  adAgeCampaigns.forEach(c=>all.push({brand:'📰 Ad Age',...c}));
  piCampaigns.forEach(c=>all.push({brand:'💼 P&I',...c}));
  gwCampaigns.forEach(c=>all.push({brand:'🔬 GW',...c}));
  ccbCampaigns.forEach(c=>all.push({brand:'🌆 CCB',...c}));
  cdbCampaigns.forEach(c=>all.push({brand:'🏙️ Detroit',...c}));
  return all;
}

function buildOverviewBest(){
  const all=getAllCampaigns().filter(c=>c.sent>=5000);
  const medals=['🥇','🥈','🥉','4','5','6','7','8','9','10'];
  const topOR=[...all].sort((a,b)=>b.or_pct-a.or_pct).slice(0,10);
  const topCTR=[...all].sort((a,b)=>b.ctr-a.ctr).slice(0,10);
  document.getElementById('ovw-best-or').innerHTML=topOR.map((c,i)=>`<tr${i===0?' class="hl"':''}>
    <td>${medals[i]}</td>
    <td><div style="font-weight:700;font-size:.78rem">${c.brand} · ${c.client||''}</div><div class="subj" style="font-size:.7rem;color:#64748b">${(c.subject||'').slice(0,60)}${c.subject&&c.subject.length>60?'…':''}</div></td>
    <td class="num">${fN(c.sent)}</td>
    <td class="num"><span class="rate hi">${c.or_pct}%</span></td>
    <td class="num">${c.ctr}%</td>
  </tr>`).join('');
  document.getElementById('ovw-best-ctr').innerHTML=topCTR.map((c,i)=>`<tr${i===0?' class="hl"':''}>
    <td>${medals[i]}</td>
    <td><div style="font-weight:700;font-size:.78rem">${c.brand} · ${c.client||''}</div><div class="subj" style="font-size:.7rem;color:#64748b">${(c.subject||'').slice(0,60)}${c.subject&&c.subject.length>60?'…':''}</div></td>
    <td class="num">${fN(c.sent)}</td>
    <td class="num">${c.or_pct}%</td>
    <td class="num"><span class="rate hi">${c.ctr}%</span></td>
  </tr>`).join('');
}

let ovwChartsInit=false;
function initOverviewCharts(){
  if(ovwChartsInit) return; ovwChartsInit=true;
  const brandLabels=['MH','Ad Age','P&I','GenomeWeb',"Crain's Chi.","Crain's Det."];
  const brandORs=[5.45,3.9,5.81,6.22,5.44,8.69];
  const brandCTRs=[0.292,0.144,0.208,0.44,0.251,0.911];
  const brandColors=['rgba(0,75,135,.85)','rgba(212,0,47,.80)','rgba(26,92,56,.85)','rgba(107,33,168,.85)','rgba(180,83,9,.85)','rgba(29,78,216,.85)'];
  const baseOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{color:'#64748b',font:{size:11}}},x:{grid:{display:false},ticks:{color:'#64748b',font:{size:11}}}}};
  new Chart(document.getElementById('ovw-or-chart'),{type:'bar',data:{labels:brandLabels,datasets:[{data:brandORs,backgroundColor:brandColors,borderRadius:6,borderSkipped:false}]},options:{...baseOpts,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>' '+v.raw+'% open rate'}}}}});
  new Chart(document.getElementById('ovw-ctr-chart'),{type:'bar',data:{labels:brandLabels,datasets:[{data:brandCTRs,backgroundColor:brandColors,borderRadius:6,borderSkipped:false}]},options:{...baseOpts,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>' '+v.raw+'% CTR'}}}}});
}
